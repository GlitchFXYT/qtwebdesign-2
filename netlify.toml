[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

# The TanStack Start nitro build (preset = "netlify") emits a Netlify Function
# at .netlify/functions-internal/server and writes the redirect rules that send
# every non-static request to it. No manual [[redirects]] block is needed.
